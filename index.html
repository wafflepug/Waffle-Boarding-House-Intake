<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Sitting Intake Form</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #333333;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .form-container { 
            width: 100%;
            max-width: 650px; 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        h1 { 
            text-align: center; 
            color: var(--primary); 
            font-size: 1.6rem;
            margin-bottom: 20px; 
        }
        
        /* Progress Bar Tracker */
        .progress-container { 
            display: flex; 
            justify-content: space-between; 
            position: relative; 
            margin-bottom: 30px; 
            max-width: 100%;
        }
        .progress-container::before { 
            content: ''; 
            background-color: var(--border); 
            position: absolute; 
            top: 50%; 
            left: 0; 
            transform: translateY(-50%); 
            height: 4px; 
            width: 100%; 
            z-index: 1; 
        }
        .progress-bar { 
            background-color: var(--success); 
            position: absolute; 
            top: 50%; 
            left: 0; 
            transform: translateY(-50%); 
            height: 4px; 
            width: 0%; 
            z-index: 1; 
            transition: width 0.4s ease; 
        }
        .circle { 
            background-color: #fff; 
            border: 3px solid var(--border); 
            color: #a0aec0; 
            border-radius: 50%; 
            height: 32px; 
            width: 32px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 2; 
            font-weight: 600; 
            transition: all 0.4s ease; 
            font-size: 0.85rem; 
        }
        .circle.active { 
            border-color: var(--success); 
            color: var(--success); 
            transform: scale(1.05); 
        }
        
        /* Step Slides Layout */
        .form-step { display: none; animation: slideIn 0.35s ease-out; }
        .form-step.active { display: block; }
        
        fieldset { border: none; margin-bottom: 10px; }
        legend { font-weight: 700; color: var(--primary); font-size: 1.2rem; margin-bottom: 20px; display: block; }
        
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.95rem; color: #4a5568; }
        
        input[type="text"], input[type="tel"], input[type="number"], select, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            font-size: 1rem;
            background-color: #f8fafc;
            transition: all 0.2s ease;
        }
        input:focus, textarea:focus, select:focus {
            background-color: #fff;
            border-color: var(--secondary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 218, 0.15);
        }
        textarea { resize: vertical; height: 90px; }
        
        /* Custom Radio Buttons */
        .radio-group { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 4px; }
        .radio-group label { 
            font-weight: 500; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            cursor: pointer; 
            background: #f1f5f9;
            padding: 10px 16px;
            border-radius: 6px;
            border: 1px solid transparent;
            flex: 1;
            min-width: 100px;
            justify-content: center;
        }
        .radio-group input[type="radio"] { transform: scale(1.1); }
        .radio-group label:has(input:checked) {
            background: #e0f2fe;
            border-color: var(--secondary);
            color: #0369a1;
        }
        
        /* Legal Warning Panels */
        .waiver-box { background: #fff5f5; border-left: 4px solid var(--danger); padding: 18px; margin-bottom: 20px; border-radius: 6px; }
        .checkbox-group { display: flex; align-items: flex-start; gap: 10px; margin-top: 12px; }
        .checkbox-group label { font-weight: 500; font-size: 0.9rem; color: #4a5568; cursor: pointer; display: inline; }
        .checkbox-group input { margin-top: 3px; transform: scale(1.1); }
        
        /* Action Controls Layout Base */
        .btn-controls { 
            display: flex; 
            justify-content: space-between; 
            gap: 12px; 
            margin-top: 25px; 
            border-top: 1px solid var(--border); 
            padding-top: 20px; 
        }
        button { 
            padding: 12px 24px; 
            border: none; 
            border-radius: 6px; 
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s ease; 
        }
        .btn-prev { background-color: #e2e8f0; color: #4a5568; }
        .btn-prev:hover:not(:disabled) { background-color: #cbd5e1; }
        .btn-prev:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-next { background-color: var(--secondary); color: white; }
        .btn-next:hover { background-color: #2980b9; }
        
        .btn-submit { background-color: var(--success); color: white; display: none; }
        .btn-submit:hover { background-color: #219653; }
        
        #formStatus { text-align: center; margin-top: 15px; font-weight: 600; font-size: 0.95rem; }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            body { padding: 10px; }
            .form-container { padding: 20px 15px; border-radius: 8px; }
            h1 { font-size: 1.4rem; }
            .circle { height: 28px; width: 28px; font-size: 0.75rem; }
            .radio-group label { flex-basis: 100%; }
            .btn-controls { flex-direction: column-reverse; }
            button { width: 100%; padding: 14px; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(15px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

<div class="form-container">
    <h1>Dog Sitting Intake Form</h1>
    
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
        <div class="circle active">1</div>
        <div class="circle">2</div>
        <div class="circle">3</div>
        <div class="circle">4</div>
        <div class="circle">5</div>
        <div class="circle">6</div>
        <div class="circle">7</div>
    </div>

    <form id="intakeForm">

        <div class="form-step active">
            <fieldset>
                <legend>1. Owner Details</legend>
                <div class="form-group">
                    <label for="ownerName">Owner Name *</label>
                    <input type="text" id="ownerName" name="ownerName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="mobileNumber">Mobile Number *</label>
                    <input type="tel" id="mobileNumber" name="mobileNumber" placeholder="0400 000 000" required>
                </div>
                <div class="form-group">
                    <label for="emergencyContact">Emergency Contact Name *</label>
                    <input type="text" id="emergencyContact" name="emergencyContact" required>
                </div>
                <div class="form-group">
                    <label for="emergencyPhone">Emergency Phone *</label>
                    <input type="tel" id="emergencyPhone" name="emergencyPhone" required>
                </div>
            </fieldset>
        </div>

        <div class="form-step">
            <fieldset>
                <legend>2. Dog Information</legend>
                <div class="form-group">
                    <label for="dogName">Dog's Name *</label>
                    <input type="text" id="dogName" name="dogName" required>
                </div>
                <div class="form-group">
                    <label for="breed">Breed *</label>
                    <input type="text" id="breed" name="breed" placeholder="e.g. Moodle" required>
                </div>
                <div class="form-group">
                    <label for="age">Age *</label>
                    <input type="text" id="age" name="age" placeholder="e.g. 3 years" required>
                </div>
                <div class="form-group">
                    <label for="weight">Weight (kg) *</label>
                    <input type="text" id="weight" name="weight" placeholder="e.g. 12kg" required>
                </div>
                <div class="form-group">
                    <label>Sex *</label>
                    <div class="radio-group">
                        <label><input type="radio" name="sex" value="Male" required> Male</label>
                        <label><input type="radio" name="sex" value="Female"> Female</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Desexed *</label>
                    <div class="radio-group">
                        <label><input type="radio" name="desexed" value="Yes" required> Yes</label>
                        <label><input type="radio" name="desexed" value="No"> No</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Vaccinated *</label>
                    <div class="radio-group">
                        <label><input type="radio" name="vaccinated" value="Yes" required> Yes</label>
                        <label><input type="radio" name="vaccinated" value="No"> No</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Microchipped *</label>
                    <div class="radio-group">
                        <label><input type="radio" name="microchipped" value="Yes" required> Yes</label>
                        <label><input type="radio" name="microchipped" value="No"> No</label>
                    </div>
                </div>
            </fieldset>
        </div>

        <div class="form-step">
            <fieldset>
                <legend>3. Behaviour & Temperament</legend>
                <div class="form-group">
                    <label>Friendly with other dogs?</label>
                    <div class="radio-group"><label><input type="radio" name="friendlyDogs" value="Yes"> Yes</label><label><input type="radio" name="friendlyDogs" value="No"> No</label></div>
                </div>
                <div class="form-group">
                    <label>Friendly with cats?</label>
                    <div class="radio-group"><label><input type="radio" name="friendlyCats" value="Yes"> Yes</label><label><input type="radio" name="friendlyCats" value="No"> No</label></div>
                </div>
                <div class="form-group">
                    <label>Friendly with children?</label>
                    <div class="radio-group"><label><input type="radio" name="friendlyChildren" value="Yes"> Yes</label><label><input type="radio" name="friendlyChildren" value="No"> No</label></div>
                </div>
                <div class="form-group">
                    <label>Separation anxiety?</label>
                    <div class="radio-group"><label><input type="radio" name="anxiety" value="Yes"> Yes</label><label><input type="radio" name="anxiety" value="No"> No</label></div>
                </div>
                <div class="form-group">
                    <label>Any signs of Aggression?</label>
                    <div class="radio-group"><label><input type="radio" name="aggression" value="Yes"> Yes</label><label><input type="radio" name="aggression" value="No"> No</label></div>
                </div>
            </fieldset>
        </div>

        <div class="form-step">
            <fieldset>
                <legend>4. House Habits & Triggers</legend>
                <div class="form-group">
                    <label>History of escape attempts?</label>
                    <div class="radio-group"><label><input type="radio" name="escape" value="Yes"> Yes</label><label><input type="radio" name="escape" value="No"> No</label></div>
                </div>
                <div class="form-group">
                    <label>Prone to indoor accidents?</label>
                    <div class="radio-group"><label><input type="radio" name="accidents" value="Yes"> Yes</label><label><input type="radio" name="accidents" value="No"> No</label></div>
                </div>
                <div class="form-group">
                    <label for="triggers">Triggers or Fears (e.g. storms, loud noises):</label>
                    <textarea id="triggers" name="triggers" placeholder="Please list any specific anxieties or situational fears..."></textarea>
                </div>
            </fieldset>
        </div>

        <div class="form-step">
            <fieldset>
                <legend>5. Feeding Instructions</legend>
                <div class="form-group">
                    <label for="foodBrand">Food Brand / Type</label>
                    <input type="text" id="foodBrand" name="foodBrand" placeholder="e.g. Kibble / Wet Food">
                </div>
                <div class="form-group">
                    <label for="feedingTimes">Feeding Times</label>
                    <input type="text" id="feedingTimes" name="feedingTimes" placeholder="e.g. Twice daily at 8 AM and 6 PM">
                </div>
                <div class="form-group">
                    <label for="foodAmount">Food Amount</label>
                    <input type="text" id="foodAmount" name="foodAmount" placeholder="e.g. 1 cup per meal">
                </div>
                <div class="form-group">
                    <label for="allergies">Food Allergies / Dietary Restrictions</label>
                    <textarea id="allergies" name="allergies" placeholder="Write 'None' if not applicable"></textarea>
                </div>
            </fieldset>
        </div>

        <div class="form-step">
            <fieldset>
                <legend>6. Routines & Medical Care</legend>
                <div class="form-group">
                    <label for="walksPerDay">Walks per Day</label>
                    <input type="number" id="walksPerDay" name="walksPerDay" min="0">
                </div>
                <div class="form-group">
                    <label for="walkDuration">Typical Walk Duration</label>
                    <input type="text" id="walkDuration" name="walkDuration" placeholder="e.g. 30 minutes">
                </div>
                <div class="form-group">
                    <label for="medicalConditions">Medical Conditions or Medications</label>
                    <textarea id="medicalConditions" name="medicalConditions" placeholder="Dosage instructions and timing details..."></textarea>
                </div>
                <div class="form-group">
                    <label for="vetClinic">Regular Vet Clinic
